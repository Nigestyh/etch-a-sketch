<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <section class="main-container">
        <div class="title">
            <h2>Etch-a-Sketch</h2>
        </div>
        <div id="grid-container" class="grid-container"></div>
        <div class="option-container">
            <button id="canvas-btn" class="canvas-btn">
                New Canvas</button>
            <div class="colors-container">
                <select id="color-options" class="color-options">
                    <option value="">Select a Colour</option>
                    <option value="red">Red</option>
                    <option value="yellow">Yellow</option>
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                    <option value="pink">Pink</option>
                    <option value="brown">Brown</option>
                    <option value="orange">Orange</option>
                    <option value="black">Black</option>
                    <option value="white">White</option>
                    <option value="rainbow">Rainbow</option>
                </select>
            </div>
            <button id="erase-btn" class="erase-btn"><span class="btn">Erase </span></button>
            <button id="reset-btn" class="reset-btn"><span class="btn">Reset</span></button>
        </div>
    </section>
</body>

</html>
