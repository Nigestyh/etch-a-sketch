<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h2>Etch-a-Sketch</h2>
    <div id="grid-container" class="grid-container"></div>
    <button id="canvas-btn">
        New Canvas</button>
    <select>
        <option>Select a Colour</option>
        <option>Red</option>
        <option>Yellow</option>
        <option>Blue</option>
        <option>Green</option>
        <option>Pink</option>
        <option>Brown</option>
        <option>Orange</option>
        <option>Black</option>
        <option>White</option>
        <option>Rainbow</option>
    </select>
    <button>Erase</button>
    <button>Reset</button>
</body>

</html>
