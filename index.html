<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <section class="main-container">
        <div class="title">
            <h2>Etch-a-Sketch</h2>
        </div>
        <div id="grid-container" class="grid-container"></div>
        <div class="option-container">
            <button id="canvas-btn" class="canvas-btn">
                New Canvas</button>
            <div class="colors-container">
                <select class="color-options">
                    <option>Select a Colour</option>
                    <option>Red</option>
                    <option>Yellow</option>
                    <option>Blue</option>
                    <option>Green</option>
                    <option>Pink</option>
                    <option>Brown</option>
                    <option>Orange</option>
                    <option>Black</option>
                    <option>White</option>
                    <option>Rainbow</option>
                </select>
            </div>
            <button id="erase-btn" class="erase-btn"><span class="btn">Erase </span></button>
            <button id="reset-btn" class="reset-btn"><span class="btn">Reset</span></button>
        </div>
    </section>
</body>

</html>
